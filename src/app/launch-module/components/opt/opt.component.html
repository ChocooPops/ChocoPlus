<div class="container">
    <div class="container-form">
        <img class="close" [src]="srcClose" (click)="onClose()">

        @if(!isSend) {
            <p class="title"> {{ 'LAUNCH.VERIFICATION_CODE' | translate }} </p>

            <form [formGroup]="otpForm" class="otp-container" (paste)="onPaste($event)" (keydown.enter)="onValidateCode()">
                @for(ctrl of controls; track ctrl; let i = $index) {
                <input maxlength="1" type="text" class="otp-input" [formControlName]="ctrl" (input)="onInput($event, i)"
                    (keydown)="onKeyDown($event, i)" />
                }
            </form>

            <div class="container-button">
                <button (click)="onSendNewCode()"> {{ 'LAUNCH.RESEND_CODE' | translate }} </button>
                <button (click)="onValidateCode()"> {{ 'LAUNCH.CONFIRM' | translate }} </button>
            </div>
        } @else {
            <p class="title" style="margin-top: 10px;"> {{ 'LAUNCH.REGISTRATION_REQUEST_SEND_TO_ADMINISTRATOR' | translate }}  </p>
            <img [src]="srcImage" class="ask-img">
        }
    </div>
</div>
