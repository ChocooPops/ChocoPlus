@if(format === FormatType.VERTICAL) {
<app-vertical-grid [mediaList]="mediaList" [title]="title" [isLoadingCatalog]="isLoadingCatalog"></app-vertical-grid>
}@else if (format === FormatType.HORIZONTAL) {
<app-horizontal-grid [mediaList]="mediaList" [title]="title" [isLoadingCatalog]="isLoadingCatalog"></app-horizontal-grid>
}
