<div class="ml-card" 
[ngClass]="{'ml-card-not-selected' : library.id != idSelected, 
    'ml-card-selected': library.id === idSelected}">
    <div class="ml-card-header" (click)="onClickLibrary()">
        @if (library.mediaType === MediaType.MOVIE) {
        <span class="ml-type-badge ml-type-film">{{ 'MOVIES' | translate }}</span>
        <span class="ml-title">{{ 'MOVIES' | translate }}</span>
        <span class="ml-selected-dot-movie"></span>
        } @else if (library.mediaType === MediaType.SERIES) {
        <span class="ml-type-badge ml-type-serie">{{ 'SERIES' | translate }}</span>
        <span class="ml-title">{{ 'SERIES' | translate }}</span>
        <span class="ml-selected-dot-series"></span>
        }
        <span class="ml-lang"> {{ library.lang }} </span>
    </div>
    <div class="ml-card-body">
        <span class="ml-path-icon">
            <svg viewBox="0 0 16 16" width="14" height="14" fill="currentColor">
                <path
                    d="M1 3.5A1.5 1.5 0 012.5 2h11A1.5 1.5 0 0115 3.5v9A1.5 1.5 0 0113.5 14h-11A1.5 1.5 0 011 12.5v-9zM2.5 3a.5.5 0 00-.5.5v9a.5.5 0 00.5.5h11a.5.5 0 00.5-.5v-9a.5.5 0 00-.5-.5h-11z" />
                <path d="M3 5.5A.5.5 0 013.5 5h9a.5.5 0 010 1h-9A.5.5 0 013 5.5z" />
            </svg>
        </span>
        <span class="ml-path"> <input type="text" [value]="library.path" disabled> </span>
    </div>
    <div class="ml-card-footer">
        <button class="ml-btn" [ngClass]="{ 'ml-btn-refresh-in-progress': library.state === StateLibrary.IN_PROGRESS, 'ml-btn-refresh': library.state != StateLibrary.IN_PROGRESS }" 
        (click)="setHandleRefresh($event)">
            <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"
                stroke-linejoin="round">
                <path d="M2 8a6 6 0 1 1 1.5 4" />
                <polyline points="1,8 3,12 5,8" />
            </svg>
            {{ 'BUTTON.REFRESH' | translate }}
        </button>
        <button class="ml-btn ml-btn-delete" (click)="setHandleDelete($event)">
            <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"
                stroke-linejoin="round">
                <polyline points="2,4 14,4" />
                <path d="M5.5 4V2.5a.5.5 0 01.5-.5h3a.5.5 0 01.5.5V4" />
                <rect x="3" y="4" width="10" height="10" rx="1" />
                <line x1="6.5" y1="7" x2="6.5" y2="11" />
                <line x1="9.5" y1="7" x2="9.5" y2="11" />
            </svg>
            {{ 'BUTTON.DELETE' | translate }}
        </button>
    </div>
</div>
