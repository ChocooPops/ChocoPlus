<div class="lvm-overlay" (click)="onOverlayClick($event)">
    <div class="lvm-modal">

        <!--
            <div class="lvm-resize-handle lvm-rh-n" (mousedown)="onResizeMouseDown($event, 'n')"></div>
            <div class="lvm-resize-handle lvm-rh-s" (mousedown)="onResizeMouseDown($event, 's')"></div>
            <div class="lvm-resize-handle lvm-rh-e" (mousedown)="onResizeMouseDown($event, 'e')"></div>
            <div class="lvm-resize-handle lvm-rh-w" (mousedown)="onResizeMouseDown($event, 'w')"></div>
            <div class="lvm-resize-handle lvm-rh-ne" (mousedown)="onResizeMouseDown($event, 'ne')"></div>
            <div class="lvm-resize-handle lvm-rh-nw" (mousedown)="onResizeMouseDown($event, 'nw')"></div>
            <div class="lvm-resize-handle lvm-rh-se" (mousedown)="onResizeMouseDown($event, 'se')"></div>
            <div class="lvm-resize-handle lvm-rh-sw" (mousedown)="onResizeMouseDown($event, 'sw')"></div>  
        -->

        <div class="lvm-header">
            <div class="lvm-header-left">
                <span class="lvm-icon">
                    <svg viewBox="0 0 16 16" width="15" height="15" fill="none" stroke="currentColor" stroke-width="1.5"
                        stroke-linecap="round" stroke-linejoin="round">
                        <rect x="2" y="1" width="12" height="14" rx="1.5" />
                        <line x1="5" y1="5" x2="11" y2="5" />
                        <line x1="5" y1="8" x2="11" y2="8" />
                        <line x1="5" y1="11" x2="8" y2="11" />
                    </svg>
                </span>
                <div>
                    <span class="lvm-title">{{ 'EDITION.LOG.MODAL_TITLE' | translate }}</span>
                    <span class="lvm-path">{{ libraryPath }}</span>
                </div>
            </div>
            <div class="lvm-header-right">
                <!--
                    <span class="lvm-drag-hint" title="Déplacer">
                    <svg viewBox="0 0 16 16" width="13" height="13" fill="currentColor">
                        <path
                            d="M6 2a1 1 0 1 1-2 0 1 1 0 0 1 2 0zm4 0a1 1 0 1 1-2 0 1 1 0 0 1 2 0zM6 6a1 1 0 1 1-2 0 1 1 0 0 1 2 0zm4 0a1 1 0 1 1-2 0 1 1 0 0 1 2 0zM6 10a1 1 0 1 1-2 0 1 1 0 0 1 2 0zm4 0a1 1 0 1 1-2 0 1 1 0 0 1 2 0zM6 14a1 1 0 1 1-2 0 1 1 0 0 1 2 0zm4 0a1 1 0 1 1-2 0 1 1 0 0 1 2 0z" />
                    </svg>
                </span>
                -->
                <button class="lvm-close-btn" (click)="onCloseClick()" [attr.aria-label]="'BUTTON.CLOSE' | translate">
                    <svg viewBox="0 0 16 16" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2"
                        stroke-linecap="round">
                        <line x1="3" y1="3" x2="13" y2="13" />
                        <line x1="13" y1="3" x2="3" y2="13" />
                    </svg>
                </button>
            </div>
        </div>


        <div class="lvm-body">
            <app-json-viewer [data]="logData" [maxInitialDepth]="2"></app-json-viewer>
        </div>

    </div>
</div>
