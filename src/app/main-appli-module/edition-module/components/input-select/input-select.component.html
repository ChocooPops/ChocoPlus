<div class="input-select" [class.open]="isOpen">

  <button class="select-trigger" (click)="toggle()" type="button">
    <span class="select-label">{{ selectedOption ? selectedOption.name : placeholder }}</span>
    <span class="chevron">
      <svg width="10" height="10" viewBox="0 0 10 10" fill="none">
        <path d="M2 3.5L5 6.5L8 3.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </span>
  </button>

  <div class="select-dropdown">
    @for (option of options; track option.id) {
      <button
        class="select-option"
        [class.active]="option.id === selectedId"
        (click)="select(option)"
        type="button">
        <span class="select-option-name">{{ option.name }}</span>
        @if (option.id === selectedId) {
          <span class="check">
            <svg width="12" height="12" viewBox="0 0 12 12" fill="none">
              <path d="M2 6L5 9L10 3" stroke="#FFD301" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </span>
        }
      </button>
    }
  </div>
</div>

<div class="height-tmp"></div>
